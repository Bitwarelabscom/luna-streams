# Stream 1: User Model - LoRA fine-tuning config
# Train on RTX 3080 (10GB VRAM)

model:
  base: "state-spaces/mamba-370m-hf"
  hidden_dim: 1024
  num_layers: 48
  vocab_size: 50280

lora:
  rank: 16
  alpha: 32
  dropout: 0.05
  target_modules:
    - "in_proj"
    - "x_proj"
    - "dt_proj"
  # Note: out_proj and conv1d are blocked by PEFT for Mamba models

training:
  learning_rate: 2.0e-4
  batch_size: 2          # Limited by 10GB VRAM (slow Mamba path)
  gradient_accumulation: 8
  max_epochs: 10
  warmup_steps: 100
  weight_decay: 0.01
  max_seq_length: 128    # Reduced for VRAM - avg tokens ~6 words, 128 is plenty
  early_stopping_patience: 3

  # Forgetting prevention
  replay_buffer_size: 1000
  replay_mix_ratio: 0.1  # 10% replay in each batch

  # Auxiliary loss
  next_event_prediction: true
  aux_loss_weight: 0.1

heads:
  emotional_valence:
    type: mlp
    layers: [1024, 256, 1]
    activation: tanh
    output_range: [-1.0, 1.0]

  focus_topics:
    type: mlp
    layers: [1024, 256, 50]  # 50 topic classes
    activation: softmax
    top_k: 5

  # drift_signal: computed directly, no training needed
