services:
  luna-streams:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: luna-streams
    restart: unless-stopped
    ports:
      - "127.0.0.1:8100:8100"
    environment:
      - STREAMS_HOST=0.0.0.0
      - STREAMS_PORT=8100
      - STREAMS_LOG_LEVEL=info
      - STREAMS_STATE_DIR=/app/state
      - STREAMS_MODEL_DIR=/app/models
      - STREAMS_AUTO_SAVE_INTERVAL_SEC=300
      - STREAMS_SNAPSHOT_RETENTION=3
      # GGUF inference (llama.cpp)
      - STREAMS_GGUF_MODEL=mamba-370m/mamba-370m-user-q8_0.gguf
      - STREAMS_MLP_HEADS_PATH=mamba-370m/mlp_heads.safetensors
      - STREAMS_GGUF_N_CTX=256
      - STREAMS_GGUF_N_THREADS=8
      # Qwen bridge (Option B - text summaries via Ollama)
      - STREAMS_QWEN_OLLAMA_URL=http://10.0.0.30:11434
      - STREAMS_QWEN_MODEL=qwen3.5:9b
      # CPU tuning
      - OMP_NUM_THREADS=8
    volumes:
      - ./models:/app/models:ro
      - ./state:/app/state
    networks:
      - luna-chat_luna-network
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    mem_limit: 16g
    cpus: "4.0"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8100/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

networks:
  luna-chat_luna-network:
    external: true
