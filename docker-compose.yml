services:
  luna-streams:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: luna-streams
    restart: unless-stopped
    ports:
      - "127.0.0.1:8100:8100"
    environment:
      - STREAMS_HOST=0.0.0.0
      - STREAMS_PORT=8100
      - STREAMS_LOG_LEVEL=info
      - STREAMS_STATE_DIR=/app/state
      - STREAMS_MODEL_DIR=/app/models
      - STREAMS_AUTO_SAVE_INTERVAL_SEC=300
      - STREAMS_SNAPSHOT_RETENTION=3
      # GGUF inference (llama.cpp with GPU offload)
      - STREAMS_GGUF_MODEL=mamba-2.8b/mamba-2.8b-user-q8_0.gguf
      - STREAMS_MLP_HEADS_PATH=mamba-2.8b/mlp_heads.safetensors
      - STREAMS_GGUF_N_CTX=256
      - STREAMS_GGUF_N_THREADS=2
      - STREAMS_GGUF_N_GPU_LAYERS=-1
      - STREAMS_HIDDEN_DIM=2560
      # Qwen bridge (localhost - same machine as Ollama)
      - STREAMS_QWEN_OLLAMA_URL=http://host.docker.internal:11434
      - STREAMS_QWEN_MODEL=qwen3.5:9b
      # GPU tuning
      - OMP_NUM_THREADS=2
      - NVIDIA_VISIBLE_DEVICES=1
    volumes:
      - ./models:/app/models:ro
      - ./state:/app/state
    networks:
      - luna-chat_luna-network
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    mem_limit: 16g
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['1']
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8100/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

networks:
  luna-chat_luna-network:
    external: true
